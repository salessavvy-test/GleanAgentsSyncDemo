name: Glean Agent Sync

on:
  push:
    branches: [master]
    paths:
      - '.glean/agents/**'
  pull_request:
    paths:
      - '.glean/agents/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - uses: ./.github/actions/agent-sync-action
        with:
          instance-url-fe: https://canary.glean.com
          instance-url-be: https://salessavvy-test-be.glean.com/qe-glean-exp/112/
          api-token: ${{ secrets.GLEAN_AGENT_SYNC_TOKEN }}
